<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" role="img" aria-label="bettercode — code opens Claude Code; VS Code lives on as vscode">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="0.55" stop-color="#101a2e"/>
      <stop offset="1" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8b84a"/>
      <stop offset="1" stop-color="#f5d67b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a9de8"/>
      <stop offset="1" stop-color="#7bc4f5"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- terminal window motif -->
  <rect x="80" y="70" width="520" height="200" rx="12" fill="#0d1322" stroke="#2a3a5e" stroke-width="2"/>
  <circle cx="112" cy="98" r="7" fill="#e85a4a"/>
  <circle cx="136" cy="98" r="7" fill="#e8b84a"/>
  <circle cx="160" cy="98" r="7" fill="#4ae87a"/>
  <text x="112" y="160" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="30" fill="#7bc4f5">$ code<tspan fill="#f5d67b"> -p</tspan><tspan fill="#c8d4ea"> fix the failing test</tspan></text>
  <rect x="112" y="185" width="16" height="30" fill="url(#gold)"/>
  <text x="112" y="245" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="22" fill="#5a6a8a">$ vscode .   # still yours</text>

  <!-- title block -->
  <text x="680" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="url(#gold)">bettercode</text>
  <text x="682" y="185" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-style="italic" fill="#c8d4ea">one word, new meaning — `code` opens Claude Code,</text>
  <text x="682" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-style="italic" fill="#c8d4ea">VS Code lives on as `vscode`</text>
  <rect x="682" y="240" width="440" height="3" fill="url(#blue)"/>
  <text x="682" y="272" font-family="Verdana, Geneva, sans-serif" font-size="17" letter-spacing="2" fill="#8a9ac0">1 PLUGIN FILE · 0 DEPS · 12/12 TESTS · NOTHING CLOBBERED</text>
</svg>
